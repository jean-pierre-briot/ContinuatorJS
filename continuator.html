<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Continuator JS</title>
</head>
<body>

<div id="continuatorUI">

    <h2>Continuator JS</h2>

    <div class="row">
        <button id="start">Start</button>
        <button id="stop">Stop</button>
        <button id="reset">Reset</button>
    </div>

    <div class="row">
        <label>Max continuation length (notes):
            <input type="range" id="maxLengthSlider" min="1" max="64" value="20">
            <span id="maxLengthValue">20</span>
        </label>
    </div>

    <div class="row">
        <label>
            <input type="checkbox" id="defaultRandomContinuationFirstNoteCheckbox">
            Default random continuation fist note
        </label>
    </div>

    <div class="row">
        <label>Transposition (semitones):
            <input type="range" id="transposeSlider" min="0" max="18" step="2" value="6">
            <span id="transposeValue">6</span>
        </label>
    </div>

    <div class="row">
        <label>Player stop continuator start threshold (ms):
            <input type="range" id="silenceSlider" min="200" max="5000" step="100" value="1500">
            <span id="silenceValue">1500</span>
        </label>
    </div>

    <div class="row">
        <label>
            <input type="checkbox" id="freezeTrainingCheckbox">
            Freeze training
        </label>
    </div>

    <div id="status">State: IDLE</div>

</div>

<style>
    #continuatorUI {
        font-family: sans-serif;
        width: 350px;
        padding: 12px;
        border-radius: 8px;
        background: #111;
        color: #eee;
    }

    #continuatorUI h2 {
        margin-top: 0;
        text-align: center;
    }

    .row {
        margin-bottom: 10px;
    }

    button {
        margin-right: 5px;
        padding: 5px 8px;
        border-radius: 4px;
        border: none;
        cursor: pointer;
    }

    button:hover {
        opacity: 0.8;
    }

    input[type="range"] {
        width: 100%;
    }

    #status {
        margin-top: 10px;
        padding: 6px;
        background: #222;
        border-radius: 4px;
        text-align: center;
        font-size: 0.9em;
    }
</style>

<script>

// Continuator in JavaScript
// Version 1.1.4
// Versions/dates: current: 04/03/2026; first: 16/02/2026
// Polyphonic, Interface
// Jean-Pierre Briot

// This is a reimplementation and adaptation in JavaScript of my reimplementation in Python of the Continuator from Francois Pachet.
// His original implementation (in 2002, in Java) had unfortunately been lost.

// This implementation is operational but still minimal and still evolving

// It is available online (Web) via https://perso.lip6.fr/Jean-Pierre.Briot/infomusic/continuator.html

// See more information about these implementations (Python and JavaScript) in https://github.com/jean-pierre-briot/ContinuatorPy
// and in https://github.com/jean-pierre-briot/ContinuatorJS

// MIDI System Parameters
let input = null;
let output = null;
let recordedEvents = [];
let activeNotes = new Map();
let silenceTimer = null;
// Continuator Parameters
// Constants and System Parameters
const minMidiPitch = 0;
const maxMidiPitch = 128;
const maxMidiVelocity = 64;
const indent = '__';
let recordingStartTime = null;
let continuator = null;
const State = {
    IDLE: "IDLE",
    LISTENING: "LISTENING",
    ANALYZING: "ANALYZING",
    GENERATING: "GENERATING",
    PLAYING: "PLAYING",
    STOPPED: "STOPPED"
};
let currentState = State.IDLE;
let generationTimer = null;
let scheduledTimeouts = [];
let activeGeneratedNotes = new Set();
let scheduledNotes = [];
let continuatorDisabled = false;
// Continuator Configuration/Control Parameters
let playerSilenceContinuatorStartThreshold = 1000;
let maxContinuationLength = 10;
const maxPlayedNotesConsidered = 20;
const pseudoMaxOrder = 15;
const defaultGeneratedNoteDuration = 1000;
const defaultGeneratedNoteVelocity = maxMidiVelocity;
let keyTranspositionSemiTones = 6;
let firstContinuationDefaultRandomGenerationMode = true;
let freezeTraining = false;
const generalDefaultRandomGenerationMode = true;
// const generationDurationMode = 'Learnt';
const generationDurationMode = 'Played';
const defaultFixedDuration = 1000;

// const playerSilenceContinuatorStartThreshold2 = 2000;          // To be removed

// Web and MIDI Interaction

const maxLengthSlider = document.getElementById("maxLengthSlider");
const maxLengthValue = document.getElementById("maxLengthValue");

maxLengthSlider.oninput = () => {
    maxContinuationLength = parseInt(maxLengthSlider.value);
    maxLengthValue.innerText = maxContinuationLength;
};

const transposeSlider = document.getElementById("transposeSlider");
const transposeValue = document.getElementById("transposeValue");

transposeSlider.oninput = () => {
    keyTranspositionSemiTones = parseInt(transposeSlider.value);
    transposeValue.innerText = keyTranspositionSemiTones;
};

const silenceSlider = document.getElementById("silenceSlider");
const silenceValue = document.getElementById("silenceValue");

silenceSlider.oninput = () => {
    playerSilenceContinuatorStartThreshold = parseInt(silenceSlider.value);
    silenceValue.innerText = playerSilenceContinuatorStartThreshold;
};

document.getElementById("start").onclick = async () => {
    const access = await navigator.requestMIDIAccess();
    input = [...access.inputs.values()][0];
    output = [...access.outputs.values()][0];
    continuator = new PrefixTreeContinuator();
    if (!input || !output) {
        alert("No MIDI input or output found.");
        return;
    }
    currentState = State.IDLE;
    input.onmidimessage = onMIDIMessage;
    document.getElementById("status").innerText =
        "Listening on: " + input.name;
};

document.getElementById("stop")
    .addEventListener("click", stopContinuator);

document.getElementById("reset")
    .addEventListener("click", () => {
        continuator = new PrefixTreeContinuator();
        console.log("Model reset.");
    });

freezeTraining = document.getElementById("freezeTrainingCheckbox").checked;

firstContinuationDefaultRandomGenerationMode = document.getElementById("defaultRandomContinuationFirstNoteCheckbox").checked;

function onMIDIMessage(event) {
    const [status, pitch, velocity] = event.data;
    const command = status & 0xf0;
    const channel = status & 0x0f;
    if (currentState === State.STOPPED) return;
    currentState = State.LISTENING;
    const now = event.timeStamp
    if (!recordingStartTime) {
        recordingStartTime = now;
    }
    const relativeTime = now - recordingStartTime;
    if (command === 0x90 && velocity > 0) {
        activeNotes.set(pitch, relativeTime);
        recordedEvents.push({
            type: "on",
            pitch: pitch,
            velocity: velocity,
            channel: channel,
            time: relativeTime
        });
        resetSilenceTimer();
    }
    if (command === 0x80 || (command === 0x90 && velocity === 0)) {
        if (activeNotes.has(pitch)) {
            recordedEvents.push({
                type: "off",
                pitch: pitch,
                velocity: 0,
                channel: channel,
                time: relativeTime
            });
            activeNotes.delete(pitch);
        }
        resetSilenceTimer();
    }
}

function resetSilenceTimer() {
    if (silenceTimer) clearTimeout(silenceTimer);
    silenceTimer = setTimeout(() => {
        if (recordedEvents.length > 0 && activeNotes.size === 0) {
//            document.getElementById("status").innerText = "Active";
            generateSequence();
            recordedEvents = [];
            recordingStartTime = null;
        }
    }, playerSilenceContinuatorStartThreshold);
}

function stopContinuator() {
    console.log("Manual stop requested.");
    continuatorDisabled = true;
    clearAllScheduledNotes();
    document.getElementById("status").innerText = "Stopped";
    // Annule tous les timeouts
    scheduledTimeouts.forEach(t => clearTimeout(t));
    scheduledTimeouts = [];
    if (generationTimer) {
        clearTimeout(generationTimer);
        generationTimer = null;
    }
    // Force note-off pour toutes les notes encore actives
    activeGeneratedNotes.forEach(pitch => {
        output.send([0x80, pitch, 0]);
    });
    activeGeneratedNotes.clear();
    currentState = State.STOPPED;
}

function clearAllScheduledNotes() {
    for (let id of scheduledNotes) {
        clearTimeout(id);
    }
    scheduledNotes = [];
}

function resetContinuator() {
    continuatorDisabled = false;
    currentState = State.IDLE;
}

function generateSequence() {
//    isGenerating = true;
    firstContinuationDefaultRandomGenerationMode = document.getElementById("defaultRandomContinuationFirstNoteCheckbox").checked;
    if (currentState === State.PLAYING) return;
    currentState = State.ANALYZING;
    document.getElementById("status").innerText = "Analyzing";
    const playedNotes = continuator.decodeNoteEventSequence(recordedEvents);
    // for (let note of playedNotes) {
    //     console.log("generateSequence: playedNotes: pitch: " + note.pitch.toString() + " delta: ", note.delta.toString() + " duration: ", note.duration.toString());
    // }
    freezeTraining = document.getElementById("freezeTrainingCheckbox").checked;
    if (freezeTraining) {
        document.getElementById("status").innerText = "Training";
        continuator.train(playedNotes);
    }
    currentState = State.PLAYING;
    currentState = State.GENERATING;
    document.getElementById("status").innerText = "Generating";
    const continuationSequence = continuator.generateContinuationNoteSequence(playedNotes);
    // for (let note of continuationSequence) {
    //     console.log("generateSequence: continuationSequence: pitch: " + note.pitch.toString() + " delta: ", note.delta.toString() + " duration: ", note.duration.toString());
    // }
    currentState = State.GENERATING;
    document.getElementById("status").innerText = "Playing";
    let baseTime = performance.now();
    let accumulatedTime = 0;
    for (let note of continuationSequence) {
        // console.log("generateSequence: pitch: " + note.pitch.toString() + " delta: ", note.delta.toString() + " duration: ", note.duration.toString());
        accumulatedTime += note.delta;
        const startTime = baseTime + accumulatedTime;
        playMidiNote(output, note.pitch, note.velocity, startTime, note.duration);
    }
    currentState = State.IDLE;
    document.getElementById("status").innerText = "Idle";
//    isGenerating = false;
}

function playMidiNote(output, pitch, velocity, startTime, duration) {
    if (velocity === null) {
        console.log("playMidiNote: velocity null.");
        velocity = maxMidiVelocity;
    }
//    console.log("playMidiNote: " + pitch.toString() + " velocity: " + velocity.toString() + " startTime: " + startTime.toString() + " duration: " + duration.toString());
    output.send([0x90, pitch, velocity], startTime);
    let endTime = startTime + duration;
    output.send([0x80, pitch, 0], endTime);
    scheduledNotes.push({ pitch, endTime });
}

// Continuator

class Note {
    constructor(pitch, velocity, duration, startTime, delta) {
        this.pitch = pitch;
        this.duration = duration;
        this.velocity = velocity;
        this.startTime = startTime;
        this.delta = delta;
    }

    match(note) {
        return note.pitch === this.pitch;
    }
}

function noteSequenceToPitchSequence(noteSequence) {
    let pitchSequence = [];
    for (let note of noteSequence) {
        pitchSequence.push(note.pitch);
    }
    return pitchSequence;
}

// function pitchSequenceToNoteSequence(pitchSequence) {
//     let noteSequence = [];
//     for (let pitch of pitchSequence) {
// //                                  (pitch, velocity, duration, startTime, delta)
//         noteSequence.push(new Note(pitch, defaultGeneratedNoteVelocity, defaultGeneratedNoteDuration, 0., 0.));
//     }
//     return noteSequence;
// }

function computeDelta(noteSequence) {
    for (let i = 1; i < noteSequence.length; i++) {
        noteSequence[i].delta = noteSequence[i].startTime - noteSequence[i - 1].startTime;
    }
}

class PrefixTreeNode {
    constructor() {
        this.note = null;
        this.childrenList = [];
        this.continuationIndexList = [];
    }
}

class PrefixTreeContinuator {

    constructor() {
        this.rootDictionary = new Map;
        this.continuationDictionary = new Map;
        this.continuationDictionaryCurrentIndex = 1;
        this.currentNoteOnDict = new Map();
//        this.playedNoteSequence = [];
//        this.continuationNoteSequence = [];
        this.isGenerating = false;
    }

    //    {type: "off",  pitch: pitch,   velocity: 0,    channel: channel,   time: relativeTime}
    decodeNoteEventSequence(noteEventSequence) {
        let playedNoteSequence = [];
        let continuationNoteSequence = [];
        let isFirstNotePlayed = true;
        let lastNoteEndTime = null;
//        let continuatorStopTime = null;
        let currentTime = null;
        let previousNoteStartTime = null
        for (let event of noteEventSequence) {
            // console.log("decodeNoteEventSequence: loop step: type: " + event.type.toString() + " pitch: " + event.pitch.toString() + " velocity: " + event.velocity.toString());
//            currentTime = performance.now();
            currentTime = event.time;
            if (event.type === "on" && event.velocity > 0.) {
                // console.log("Note on -- currentTime: " + currentTime.toString());
                if (event.note in this.currentNoteOnDict) {
                    console.log("Warning: Note " + event.pitch + " has been repeated before being ended");
                } else {
                    let delta = 0;
                    if (isFirstNotePlayed) {
                        isFirstNotePlayed = false;
//                      this.playAllPendingNoteOffEvents(output, continuationNoteSequence);           HACK
                    } else {
                        delta = (currentTime - previousNoteStartTime) * 1000;
                    }
//                                          (pitch, velocity, duration, startTime, delta)
//                     console.log("Note on -- before creating note performance.now(): " + performance.now().toString());
//                     console.log("decodeNoteEventSequence: creating note: pitch: " + event.pitch.toString() + " duration: " + "null" + " startTime: " + currentTime.toString() + " delta: " + delta.toString());
                    let note = new Note(event.pitch, event.velocity, null, currentTime, delta);
                    this.currentNoteOnDict.set(note.pitch, new Map([["note", note], ["noteStartTime", currentTime]]));
// //                  if len(currentNoteOnDict.size >= 3 {
// //                  orderedPitchList = sorted(list(currentNoteOnDict));
// //                  let chord = chordifyPitchList(ordered_pitch_list);
//                         console.log("decodeNoteEventSequence: push(note): " + note.toString());
                    playedNoteSequence.push(note);
                    previousNoteStartTime = currentTime;
                }
            } else if (((event.type === "off") || ((event.type === "on") && (event.velocity === 0))) && (this.currentNoteOnDict.has(event.pitch))) {
                let entry = this.currentNoteOnDict.get(event.pitch);
                let note = entry.get("note");
                let noteStartTime = entry.get("noteStartTime");
                this.currentNoteOnDict.delete(event.pitch);
//                currentTime = performance.now();
//                 console.log("Note off -- performance.now(): " + performance.now().toString());
//                 console.log("Note off -- currentTime: " + currentTime.toString());
                note.duration = currentTime - noteStartTime;        // or * 1000 ??
                lastNoteEndTime = currentTime;
            } else if ((event.type === "off") || ((event.type === "on") && (event.velocity === 0))) {
                console.log("Warning: Event: " + event.toString() + " with type: " + event.type.toString() + ' and Note: ' + event.pitch.toString() + " finished before being started.");
            } else {
                console.log("Warning: decodeNoteEventSequence: Unknown case.");
            }
        }
        return playedNoteSequence;
    }

    train(noteSequence) {
        computeDelta(noteSequence);
        this.internalTrainWithoutKeyTranspose(noteSequence);
        if (keyTranspositionSemiTones > 0) {
            const notePitchSequence = noteSequenceToPitchSequence(noteSequence);
            const downIterationsNumber = Math.min(Math.min(...notePitchSequence) - minMidiPitch, keyTranspositionSemiTones - 1);
            const upIterationsNumber = Math.min(maxMidiPitch - Math.max(...notePitchSequence), keyTranspositionSemiTones);
            let i = 1;
            while (i <= downIterationsNumber) {
                this.internalTrainWithoutKeyTranspose(this.transpose(noteSequence, -i));
                i = i + 1;
            }
            i = 1;
            while (i <= upIterationsNumber) {
                this.internalTrainWithoutKeyTranspose(this.transpose(noteSequence, i));
                i = i + 1;
            }
        }
    }

    transpose(noteSequence, t) {
        let transposedNoteSequence = []
        for (let note of noteSequence) {
//                                                   (pitch, velocity, duration, startTime, delta)
            transposedNoteSequence.push(new Note(note.pitch + t, note.velocity, note.duration, note.startTime, note.delta));
        }
        return transposedNoteSequence;
    }

    internalTrainWithoutKeyTranspose(noteSequence) {  // Main internal train function
        if (this.rootDictionary.size === 0 && noteSequence.length <= 1) {
            throw new Error('Only one note initially played, thus none continuation can be learnt and therefore generated');
        }
        // reversed_note_sequence = note_sequence[::-1]
        const reversedNoteSequence = [...noteSequence].reverse();  // [note_N, ... , note_1]
        let i = 0;  // index of the first item of the reversed played note sequence
        while (i < reversedNoteSequence.length - 1) {  // i varies from 0 to length-1
            const subReversedNoteSequence = reversedNoteSequence.slice(i);  // [note_i, ... , note_1]
            const continuationNote = subReversedNoteSequence[0];  // note_i
            // Add to continuation dictionary
            this.continuationDictionary.set(this.continuationDictionaryCurrentIndex, continuationNote);
            const rootNote = subReversedNoteSequence[1];  // root candidate
            let currentNode;
            if (!(this.rootDictionary.has(rootNote.pitch))) {
                // Create new root node
                currentNode = new PrefixTreeNode();
                this.rootDictionary.set(rootNote.pitch, currentNode);
                currentNode.note = rootNote;
                currentNode.continuationIndexList = [this.continuationDictionaryCurrentIndex];
            } else {
                // Existing root node
                currentNode = this.rootDictionary.get(rootNote.pitch);
                currentNode.continuationIndexList.push(this.continuationDictionaryCurrentIndex);
            }
            // Traverse deeper levels
            for (let j = 2; j < subReversedNoteSequence.length; j++) {
                const note = subReversedNoteSequence[j];
                if (currentNode.childrenList == null) {
                    // Leaf reached ? create child
                    const newChildNode = new PrefixTreeNode();
                    newChildNode.note = note;
                    newChildNode.continuationIndexList = [this.continuationDictionaryCurrentIndex];
                    currentNode.childrenList = [newChildNode];
                    currentNode = newChildNode;
                } else {
                    let nodeExists = false;
                    for (let childNode of currentNode.childrenList) {
                        if (childNode.note.match(note)) {
                            childNode.continuationIndexList.push(this.continuationDictionaryCurrentIndex);
                            nodeExists = true;
                            currentNode = childNode;
                            break;
                        }
                    }
                    if (!nodeExists) {
                        const newChildNode = new PrefixTreeNode();
                        newChildNode.note = note;
                        newChildNode.continuationIndexList = [this.continuationDictionaryCurrentIndex];
                        currentNode.childrenList.push(newChildNode);
                        currentNode = newChildNode;
                    }
                }
            }
            this.continuationDictionaryCurrentIndex = this.continuationDictionaryCurrentIndex + 1;
            i = i + 1;  // Continue one level down
        }
    }

    displayMemory() {
        console.log('Memory:');
        for (let root of this.rootDictionary.values()) {
            this.displayTree(root, 0);
        }
    }


    displayTree(node, level) {
        let continuationPitchList = [];
        for (let index of node.continuationIndexList) {
            continuationPitchList.push(this.continuationDictionary.get(index).pitch);
        }
        console.log(indent.repeat(level) + node.note.pitch.toString() + '[' + continuationPitchList.toString() + ']');
        if (Array.isArray(node.childrenList) && node.childrenList.length > 0) {
            for (let i = 0; i < node.childrenList.length; i++) {
                this.displayTree(node.childrenList[i], level + 1);
            }
        }
    }

    generateContinuationNoteSequence(noteSequence) {
        for (let note of noteSequence) {
        }
        const lengthNoteSequence = noteSequence.length;
        let lastInputNote = noteSequence[noteSequence.length - 1];
        let continuationNoteSequence = [];
        let matchingChild = null;
        for (let i = 1; i < maxContinuationLength; i++) {
            let ii = i;
            if (!(this.rootDictionary.has(lastInputNote.pitch))) {
                if (generalDefaultRandomGenerationMode) {
                    const randomIndex = Math.floor(Math.random() * this.continuationDictionary.size) + 1;
//                  Math.random() e [0, 1[
//                  this.continuationDictionary = {1: Note_1, ... , N: Note_N}
//                  this.continuationDictionary.size = number of keys or values = N
//                  Math.random() e [0, 1[
//                  Math.floor(Math.random() * this.continuationDictionary.size) e [0, N[
//                  Math.floor(Math.random() * this.continuationDictionary.size) + 1 e [1, N]
                    const nextNote = this.continuationDictionary.get(randomIndex);
                    noteSequence.push(nextNote);
                    continuationNoteSequence.push(nextNote);
                    lastInputNote = nextNote;
                } else if (i === 1 && firstContinuationDefaultRandomGenerationMode) {
                    const randomIndex = Math.floor(Math.random() * this.continuationDictionary.size) + 1;
                    const nextNote = this.continuationDictionary.get(randomIndex);
                    switch (generationDurationMode) {
                        case "Played":
                            if (ii > noteSequence.length) {
                                ii = i - noteSequence.length;
                            }
                            nextNote.duration = noteSequence[ii - 1].duration;
                            break;
                        case "Fixed":
                            nextNote.duration = defaultFixedDuration;
                            break;
                        // case "Learnt": do nothing
                    }
                    noteSequence.push(nextNote);
                    continuationNoteSequence.push(nextNote);
                    lastInputNote = nextNote;
                } else {
                    console.log("Generation failed.");
                    break;
                }
            } else {
                let currentNode = this.rootDictionary.get(lastInputNote.pitch);
                let j = 2;
                while (currentNode.childrenList != null && j < lengthNoteSequence) {
                    matchingChild = null;
                    for (let child of currentNode.childrenList) {
                        if (child.note.match(noteSequence[noteSequence.length - j])) {
                            matchingChild = child;
                            break;
                        }
                    }
                    if (matchingChild == null) {
                        break;
                    } else {
                        currentNode = matchingChild;
                        j++;
                    }
                }
                if (Array.isArray(currentNode.childrenList) && currentNode.childrenList.length === 0 || j >= lengthNoteSequence || j > pseudoMaxOrder || matchingChild === null) {
                    const currentNodeContinuationIndexList = currentNode.continuationIndexList;
                    const randomIndex = currentNodeContinuationIndexList[Math.floor(Math.random() * currentNodeContinuationIndexList.length)];
//                  currentNodeContinuationIndexList = [index_0, ..., index_N-1]
//                  currentNodeContinuationIndexList.length = N
//                  Math.random() e [0, 1[
//                  Math.floor(Math.random() * currentNodeContinuationIndexList.length) e [0, ... N[ = [0, ... N-1]
                    const nextNote = this.continuationDictionary.get(randomIndex);
                    switch (generationDurationMode) {
//                          case 'Learnt':                            If Learnt duration, do nothing specific
                        case "Played":
                            if (ii > noteSequence.length) {
                                ii = i - noteSequence.length;
                            }
                            nextNote.duration = noteSequence[ii - 1].duration;
                            break;
                        case "Fixed":
                            nextNote.duration = defaultFixedDuration;
                            break;
                    }
                    noteSequence.push(nextNote);
                    continuationNoteSequence.push(nextNote);
                    lastInputNote = nextNote;
                }
            }
        }
        return continuationNoteSequence;
    }
}

</script>

</body>
